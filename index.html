<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no,minimum-scale=1.0,maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#d4d4d4">
    <meta name="apple-mobile-web-app-title" content="灵机一动">
    <link rel="manifest" href="manifest.json">
    <title>灵机一动</title>
    <link rel="stylesheet" href="css/statusbar.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/widgets.css">
    <link rel="stylesheet" href="css/apps.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/settings-sub.css">
    <link rel="stylesheet" href="css/chat.css">
</head>

<body>
    <div id="phone-shell">
        <div id="phone-container">
            <!-- 状态栏 -->
            <div id="status-bar">
                <div class="status-left">
                    <span id="status-time">12:00</span>
                </div>
                <div class="status-center">
                    <div class="dynamic-island"></div>
                </div>
                <div class="status-right">
                    <svg class="status-icon" viewBox="0 0 24 24" width="14" height="14">
                        <path
                            d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"
                            fill="currentColor" />
                    </svg>
                    <svg class="status-icon" viewBox="0 0 24 24" width="14" height="14">
                        <rect x="8" y="3" width="8" height="17" rx="1.5" stroke="currentColor" stroke-width="1.5"
                            fill="none" />
                        <rect x="10" y="6" width="4" height="8" rx="0.5" fill="currentColor" />
                        <line x1="10" y1="2" x2="14" y2="2" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" />
                    </svg>
                    <span id="battery-percent">100%</span>
                </div>
            </div>

            <!-- 主屏幕 -->
            <div id="home-screen">
                <!-- 顶部大组件 4x2 -->
                <div id="top-widget">
                    <div class="top-widget-inner">
                        <div class="tw-left">
                            <div class="tw-bubble" id="tw-bubble">
                                <span class="bubble-star">*</span>
                                <span class="bubble-text" id="bubble-text">幸福淡淡的...</span>
                                <span class="bubble-star">+</span>
                            </div>
                            <div class="tw-photos">
                                <div class="tw-photo-main">
                                    <img src="" alt="" id="main-photo" class="photo-placeholder">
                                    <div class="photo-empty" id="main-photo-empty">
                                        <svg viewBox="0 0 32 32" width="24" height="24" fill="none" stroke="#aaa"
                                            stroke-width="1.5">
                                            <rect x="4" y="6" width="24" height="20" rx="2" />
                                            <circle cx="11" cy="14" r="3" />
                                            <path d="M4 22l6-6 4 4 6-8 8 10" />
                                        </svg>
                                    </div>
                                    <input type="file" accept="image/*" class="photo-input" data-target="main-photo">
                                </div>
                                <div class="tw-photo-sub">
                                    <img src="" alt="" id="sub-photo" class="photo-placeholder">
                                    <div class="photo-empty" id="sub-photo-empty">
                                        <svg viewBox="0 0 32 32" width="18" height="18" fill="none" stroke="#aaa"
                                            stroke-width="1.5">
                                            <rect x="4" y="6" width="24" height="20" rx="2" />
                                            <circle cx="11" cy="14" r="3" />
                                            <path d="M4 22l6-6 4 4 6-8 8 10" />
                                        </svg>
                                    </div>
                                    <input type="file" accept="image/*" class="photo-input" data-target="sub-photo">
                                </div>
                            </div>
                            <span class="deco s1">+</span>
                            <span class="deco s2">*</span>
                            <span class="deco s3">.</span>
                        </div>
                        <div class="tw-right">
                            <div class="tw-vinyl-wrap">
                                <div class="vinyl-disc" id="vinyl-disc">
                                    <div class="vinyl-ring r1"></div>
                                    <div class="vinyl-ring r2"></div>
                                    <div class="vinyl-ring r3"></div>
                                    <div class="vinyl-center">
                                        <img src="" alt="" id="vinyl-cover" class="photo-placeholder">
                                        <div class="photo-empty" id="vinyl-cover-empty">
                                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#ccc"
                                                stroke-width="1.5">
                                                <path d="M9 18V5l12-2v13" />
                                                <circle cx="6" cy="18" r="3" />
                                                <circle cx="18" cy="16" r="3" />
                                            </svg>
                                        </div>
                                        <input type="file" accept="image/*" class="photo-input"
                                            data-target="vinyl-cover">
                                    </div>
                                    <div class="vinyl-dot"></div>
                                </div>
                                <div class="vinyl-arm" id="vinyl-arm">
                                    <div class="arm-pivot"></div>
                                    <div class="arm-rod"></div>
                                    <div class="arm-needle"></div>
                                </div>
                            </div>
                            <div class="tw-player">
                                <div class="player-time">
                                    <span>2:12</span>
                                    <div class="progress-track">
                                        <div class="progress-fill"></div>
                                        <div class="progress-knob"></div>
                                    </div>
                                    <span>5:21</span>
                                </div>
                                <div class="player-btns">
                                    <button class="p-btn" aria-label="上一首">
                                        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                                        </svg>
                                    </button>
                                    <button class="p-btn" aria-label="快退">
                                        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                                            <path d="M11 18V6l-8.5 6zm.5-6l8.5 6V6z" />
                                        </svg>
                                    </button>
                                    <button class="p-btn play-btn" id="play-btn" aria-label="播放">
                                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"
                                            id="play-icon">
                                            <path d="M8 5v14l11-7z" />
                                        </svg>
                                    </button>
                                    <button class="p-btn" aria-label="快进">
                                        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                                            <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6z" />
                                        </svg>
                                    </button>
                                    <button class="p-btn" aria-label="下一首">
                                        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 中间区域：P2组件 + 4个App -->
                <div id="mid-section">
                    <div id="p2-widget">
                        <div class="p2-inner">
                            <div class="p2-head">
                                <span class="p2-logo">Instagram</span>
                                <span class="p2-caret">&#8964;</span>
                                <div class="p2-head-r">
                                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
                                        stroke-width="1.8">
                                        <path
                                            d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z" />
                                    </svg>
                                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
                                        stroke-width="1.8">
                                        <path
                                            d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" />
                                    </svg>
                                </div>
                            </div>
                            <div class="p2-img" id="p2-img-wrap">
                                <img src="" alt="" id="p2-photo" class="photo-placeholder">
                                <div class="photo-empty" id="p2-photo-empty">
                                    <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="#bbb"
                                        stroke-width="1.3">
                                        <rect x="4" y="6" width="24" height="20" rx="2" />
                                        <circle cx="11" cy="14" r="3" />
                                        <path d="M4 22l6-6 4 4 6-8 8 10" />
                                    </svg>
                                </div>
                                <input type="file" accept="image/*" class="photo-input" data-target="p2-photo">
                            </div>
                            <div class="p2-bar">
                                <div class="p2-bar-l">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                                        stroke-width="1.8">
                                        <path
                                            d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z" />
                                    </svg>
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                                        stroke-width="1.8">
                                        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
                                    </svg>
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                                        stroke-width="1.8">
                                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4z" />
                                    </svg>
                                </div>
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                                    stroke-width="1.8">
                                    <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z" />
                                </svg>
                            </div>
                            <div class="p2-caption" id="p2-caption">
                                <span id="p2-text">Happy Twogether(u..u) *.°</span>
                            </div>
                        </div>
                    </div>
                    <div id="mid-apps">
                        <div class="app-icon" data-app="settings">
                            <div class="icon-img">
                                <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="24" cy="24" r="7" />
                                    <path
                                        d="M24 6v4M24 38v4M6 24h4M38 24h4M10.1 10.1l2.8 2.8M35.1 35.1l2.8 2.8M10.1 37.9l2.8-2.8M35.1 12.9l2.8-2.8" />
                                </svg>
                            </div>
                            <span class="icon-label">设置</span>
                        </div>
                        <div class="app-icon" data-app="theater">
                            <div class="icon-img">
                                <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M6 12a2 2 0 012-2h32a2 2 0 012 2v20a2 2 0 01-2 2H8a2 2 0 01-2-2V12z" />
                                    <path d="M6 15h36" />
                                    <path d="M16 34v5M32 34v5M14 39h20" />
                                    <path d="M17 22v3M31 22v3" />
                                    <path d="M20 28c1.5 1.5 6.5 1.5 8 0" />
                                </svg>
                            </div>
                            <span class="icon-label">线下剧场</span>
                        </div>
                        <div class="app-icon" data-app="music">
                            <div class="icon-img">
                                <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="14" cy="34" r="6" />
                                    <circle cx="36" cy="30" r="6" />
                                    <path d="M20 34V10l22-4v24" />
                                </svg>
                            </div>
                            <span class="icon-label">音乐</span>
                        </div>
                        <div class="app-icon" data-app="mood">
                            <div class="icon-img">
                                <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="24" cy="26" r="16" />
                                    <path d="M16 23c0-2 2-5 4-5s3 2 3 4" />
                                    <path d="M32 23c0-2-2-5-4-5s-3 2-3 4" />
                                    <path d="M18 30c2 3 8 3 12 0" />
                                    <path d="M36 6l2 4 4 2-4 2-2 4-2-4-4-2 4-2z" />
                                </svg>
                            </div>
                            <span class="icon-label">心绪回响</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dock -->
            <div id="dock">
                <div class="dock-inner">
                    <div class="app-icon dock-app" data-app="chat">
                        <div class="icon-img">
                            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M8 10h32a2 2 0 012 2v18a2 2 0 01-2 2H28l-6 6v-6H8a2 2 0 01-2-2V12a2 2 0 012-2z" />
                                <circle cx="16" cy="21" r="1.5" fill="currentColor" stroke="none" />
                                <circle cx="24" cy="21" r="1.5" fill="currentColor" stroke="none" />
                                <circle cx="32" cy="21" r="1.5" fill="currentColor" stroke="none" />
                            </svg>
                        </div>
                        <span class="icon-label">Chat</span>
                    </div>
                    <div class="app-icon dock-app" data-app="novel">
                        <div class="icon-img">
                            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="24" cy="20" r="11" />
                                <path d="M17 17c0 0 2.5-3.5 7-3.5s7 3.5 7 3.5" />
                                <circle cx="19" cy="21" r="1.2" fill="currentColor" stroke="none" />
                                <circle cx="29" cy="21" r="1.2" fill="currentColor" stroke="none" />
                                <path d="M21 26c1 1.5 5 1.5 6 0" />
                                <path d="M24 31v5M19 36h10" />
                                <line x1="15" y1="9" x2="13" y2="5" />
                                <line x1="33" y1="9" x2="35" y2="5" />
                                <line x1="24" y1="9" x2="24" y2="5" />
                            </svg>
                        </div>
                        <span class="icon-label">柿子小说</span>
                    </div>
                    <div class="app-icon dock-app" data-app="worldbook">
                        <div class="icon-img">
                            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M6 8c0-1.1.9-2 2-2h10c2 0 4 1 6 3 2-2 4-3 6-3h10c1.1 0 2 .9 2 2v28c0 1.1-.9 2-2 2H30c-2 0-4 1-6 3-2-2-4-3-6-3H8c-1.1 0-2-.9-2-2V8z" />
                                <path d="M24 11v30" />
                                <path d="M12 15h6M12 20h6M12 25h6" />
                                <path d="M30 15h6M30 20h6M30 25h6" />
                            </svg>
                        </div>
                        <span class="icon-label">世界书</span>
                    </div>
                </div>
                <div class="home-bar"></div>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-mask"></div>
        <div class="modal-box">
            <h3 id="modal-title">编辑</h3>
            <div id="modal-body"></div>
            <div class="modal-btns">
                <button id="modal-cancel">取消</button>
                <button id="modal-ok">确认</button>
            </div>
        </div>
    </div>

    <script src="js/statusbar.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/widgets.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/settings-api.js"></script>
    <script src="js/settings-voice.js"></script>
    <script src="js/settings-wallpaper.js"></script>
    <script src="js/settings-appicon.js"></script>
    <script src="js/settings-font.js"></script>
    <script src="js/settings-ringtone.js"></script>
    <script src="js/settings-screen.js"></script>
    <script src="js/settings-data.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/chat-settings.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
